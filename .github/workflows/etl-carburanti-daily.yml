name: ETL Carburanti (MIMIT) - Daily

on:
  # Esecuzione automatica ogni giorno alle 09:00 UTC (~11:00 ora italiana)
  schedule:
    - cron: '0 9 * * *'

  # Permette esecuzione manuale dal tab Actions
  workflow_dispatch:

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Esegui ETL Carburanti MIMIT
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
        run: python scripts/etl_carburanti.py

      - name: Notifica esito
        if: failure()
        run: echo "::error::ETL Carburanti fallito - verificare log"